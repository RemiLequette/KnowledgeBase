<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo Tool — Bootstrap</title>
<style>
  body {
    font-family: monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #f5f4f0;
    color: #1a1917;
  }
  .msg { font-size: 13px; color: #7a7870; }
  .msg a { color: #2563eb; }
</style>
</head>
<body>
<div class="msg" id="msg">Checking server…</div>
<script>
  // ── CONFIGURE THIS FOR EACH PROJECT ──────────────────────────────────────
  const TODO_PATH = 'C:/Users/RemiLequette/Development/with-claude/knowledgebase/TODO.md';
  // ─────────────────────────────────────────────────────────────────────────

  const TOOL_PATH = TODO_PATH.replace(/TODO\.md$/i, '') +
    '../knowledgebase/public/tools/todo-tool.html';
  // Resolve tool relative to this file's own directory
  // Adjust the TOOL_PATH below if todo-tool.html is located elsewhere:
  const TOOL_ABS  = 'C:/Users/RemiLequette/Development/with-claude/knowledgebase/public/tools/todo-tool.html';
  const SERVER    = 'http://localhost:3000';
  const APP_URL   = `${SERVER}/${TOOL_ABS}?todo=${encodeURIComponent(TODO_PATH)}`;

  fetch(`${SERVER}/ping`)
    .then(r => r.json())
    .then(d => {
      if (d.ok) {
        window.location.href = APP_URL;
      } else {
        throw new Error();
      }
    })
    .catch(() => {
      document.getElementById('msg').innerHTML =
        'Start <strong>start-server.bat</strong> before opening this file. ' +
        '<br><br>Once running, <a href="' + APP_URL + '">click here</a> or reload.';
    });
</script>
</body>
</html>
