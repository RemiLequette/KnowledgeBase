<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:#e8e6e0;
    --open-h:#2563eb; --open-bg:#eef3ff;
    --wip-h:#ea580c;  --wip-bg:#fff3ee;
    --done-h:#16a34a; --done-bg:#eefaf4;
    --critical:#7c2d12; --critical-bg:#fee2e2; --critical-border:#ef4444;
    --high:#dc2626; --normal:#4f46e5; --low:#475569;
    --dirty-bg:#fef08a; --dirty-border:#f59e0b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;font-size:13px;background:var(--bg);color:#111;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  /* HEADER */
  header{background:#171614;padding:0 14px;height:44px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
  .header-left{display:flex;align-items:center;gap:10px;}
  .app-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#fff;}
  .project-name{font-family:'DM Mono',monospace;font-size:11px;color:#555;}
  .header-center{flex:1;display:flex;align-items:center;justify-content:center;padding:0 12px;}
  .search-wrap{position:relative;width:100%;max-width:320px;}
  .search-input{
    width:100%;font-family:'DM Sans',sans-serif;font-size:12px;
    background:#2a2a28;border:1px solid #3a3a38;border-radius:6px;
    color:#ddd;padding:5px 28px 5px 10px;outline:none;transition:border-color .15s;
  }
  .search-input::placeholder{color:#555;}
  .search-input:focus{border-color:#666;background:#333;}
  .search-clear{
    position:absolute;right:7px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:#555;cursor:pointer;font-size:13px;line-height:1;
    display:none;padding:0;
  }
  .search-clear.visible{display:block;}
  .search-clear:hover{color:#aaa;}
  .header-right{display:flex;align-items:center;gap:6px;}
  .status{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:10px;color:#555;}
  .status-dot{width:6px;height:6px;border-radius:50%;background:#444;transition:background .3s;}
  .status-dot.connected{background:#16a34a;}
  .status-dot.disconnected{background:#ea580c;}
  .status-dot.error{background:#dc2626;}
  .hbtn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .hbtn-light{background:#fff;color:#111;}
  .hbtn-light:hover{background:#ddd;}
  .hbtn-light:disabled{opacity:.3;cursor:not-allowed;}
  .hbtn-ghost{background:transparent;color:#aaa;border:1px solid #333;}
  .hbtn-ghost:hover{color:#fff;border-color:#666;}
  .hbtn-dark{background:#2e2e2c;color:#aaa;border:1px solid #3a3a38;}
  .hbtn-dark:hover{color:#fff;}

  .offline-banner{background:#431407;color:#fed7aa;padding:5px 14px;font-size:11px;font-family:'DM Mono',monospace;display:none;flex-shrink:0;}
  .offline-banner.visible{display:block;}

  /* BOARD */
  .board-wrap{flex:1;display:flex;overflow:hidden;}
  .board{flex:1;display:flex;gap:0;padding:10px;overflow-x:auto;overflow-y:hidden;align-items:stretch;}

  /* SWIMLANE SEP */
  .col-sep{flex-shrink:0;width:11px;display:flex;align-items:stretch;justify-content:center;}
  .col-sep::before{content:'';display:block;width:2px;border-radius:2px;background:linear-gradient(to bottom,transparent 0%,#b0aca4 15%,#b0aca4 85%,transparent 100%);align-self:stretch;margin:8px 0;}

  /* COLUMN */
  .column{flex:1;min-width:268px;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
  .col-open{background:var(--open-bg);}
  .col-wip {background:var(--wip-bg);}
  .col-done{background:var(--done-bg);}

  .col-header{padding:9px 12px 8px;display:flex;align-items:center;justify-content:center;gap:7px;flex-shrink:0;}
  .col-open .col-header{background:var(--open-h);}
  .col-wip  .col-header{background:var(--wip-h);}
  .col-done .col-header{background:var(--done-h);}
  .col-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:#fff;text-align:center;}
  .col-count{font-family:'DM Mono',monospace;font-size:10px;background:rgba(0,0,0,.22);color:rgba(255,255,255,.9);padding:1px 6px;border-radius:20px;}

  /* ACTIVE ZONE */
  .col-active{overflow-y:auto;min-height:0;display:flex;flex-direction:column;}

  /* PRIORITY LANE */
  .priority-lane{display:flex;flex-direction:column;}
  .priority-lane+.priority-lane{border-top:1px solid rgba(0,0,0,.07);margin-top:3px;padding-top:3px;}
  .priority-lane-header{display:flex;align-items:center;gap:5px;padding:3px 8px 2px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
  .priority-lane-header.critical{color:var(--critical);}
  .priority-lane-header.high  {color:var(--high);}
  .priority-lane-header.normal{color:var(--normal);}
  .priority-lane-header.low   {color:var(--low);}
  .lane-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .lane-dot.critical{background:var(--critical);}
  .lane-dot.high  {background:var(--high);}
  .lane-dot.normal{background:var(--normal);}
  .lane-dot.low   {background:var(--low);}
  .lane-cards{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:3px 7px 5px;min-height:8px;}
  .lane-cards.drag-over{background:rgba(0,0,0,.05);border-radius:5px;}

  /* SPLITTER */
  .col-splitter{height:7px;flex-shrink:0;cursor:row-resize;display:flex;align-items:center;justify-content:center;user-select:none;}
  .col-splitter::before{content:'';display:block;width:30px;height:3px;border-radius:2px;background:rgba(0,0,0,.16);}
  .col-splitter:hover::before{background:rgba(0,0,0,.32);}

  /* TRASH ZONE */
  .col-trash{overflow-y:auto;flex-shrink:0;background:rgba(0,0,0,.04);border-top:1px dashed rgba(0,0,0,.14);}
  .trash-header{display:flex;align-items:center;gap:5px;padding:4px 8px 2px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#999;}
  .trash-cards{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:3px 7px 6px;min-height:8px;}
  .trash-cards.drag-over{background:rgba(220,38,38,.07);border-radius:5px;}

  /* COL FOOTER */
  .col-footer{padding:3px 7px 7px;flex-shrink:0;}
  .add-card-btn{width:100%;padding:5px;border-radius:5px;border:2px dashed rgba(0,0,0,.13);background:transparent;color:rgba(0,0,0,.36);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;}
  .add-card-btn:hover{border-color:rgba(0,0,0,.26);background:rgba(0,0,0,.03);}
  .add-form-inline{display:none;flex-direction:column;gap:6px;background:rgba(255,255,255,.7);border-radius:7px;padding:9px;}
  .add-form-inline.open{display:flex;}
  .add-form-inline input[type="text"]{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 7px;border-radius:4px;border:1px solid #ccc;background:#fff;color:#111;outline:none;width:100%;}
  .add-form-inline input[type="text"]:focus{border-color:#888;}
  .add-form-row{display:flex;gap:5px;}
  .add-form-inline select{font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 5px;border-radius:4px;border:1px solid #ccc;background:#fff;color:#111;flex:1;}
  .add-form-btns{display:flex;gap:4px;justify-content:flex-end;}
  .btn-add-confirm{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px;border:none;cursor:pointer;background:#17161a;color:#fff;}
  .btn-add-confirm:hover{background:#333;}
  .btn-add-cancel{font-family:'DM Sans',sans-serif;font-size:11px;padding:3px 9px;border-radius:4px;border:none;cursor:pointer;background:transparent;color:#888;}
  .btn-add-cancel:hover{color:#333;}

  /* CARD */
  .card{background:#fff;border-radius:7px;border:3px solid transparent;padding:7px 8px 6px;cursor:grab;position:relative;display:flex;flex-direction:column;gap:3px;user-select:none;transition:box-shadow .15s,transform .1s;}
  .card:active{cursor:grabbing;}
  .card.dragging{opacity:.35;transform:scale(.95);}
  .card:hover{box-shadow:0 3px 10px rgba(0,0,0,.12);}
  .card.dirty-card{background:var(--dirty-bg);border-color:var(--dirty-border) !important;}
  .card-critical{border-color:var(--critical-border);background:var(--critical-bg);}
  .card-high    {border-color:var(--high);}
  .card-normal  {border-color:var(--normal);}
  .card-low     {border-color:var(--low);}
  .card.trashed{background:#f8f7f4;border-color:#d1d5db !important;opacity:.75;cursor:default;}
  .card.trashed .card-title{text-decoration:line-through;color:#9ca3af;}
  .card.trashed .card-desc{color:#bbb;}

  /* CARD CONTENT */
  .card-header-row{display:flex;align-items:center;gap:5px;}
  .card-index{
    font-family:'DM Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.04em;white-space:nowrap;flex-shrink:0;
    background:#fff;border-width:2px;border-style:solid;border-radius:4px;
    padding:1px 5px;line-height:1.4;
  }
  .card-critical .card-index{border-color:var(--critical-border);color:var(--critical);}
  .card-high     .card-index{border-color:var(--high);  color:var(--high);}
  .card-normal   .card-index{border-color:var(--normal);color:var(--normal);}
  .card-low      .card-index{border-color:var(--low);   color:var(--low);}
  .card.trashed .card-index{border-color:#d1d5db;color:#9ca3af;}
  .card-title{font-size:12px;font-weight:700;line-height:1.3;color:#111;word-break:break-word;flex:1;}
  .card-title.no-title{font-weight:400;color:#bbb;font-style:italic;font-size:11px;}

  /* DROP PLACEHOLDER */
  .drop-ph{height:5px;border-radius:3px;background:transparent;transition:all .12s;pointer-events:none;}
  .drop-ph.active{height:36px;background:rgba(37,99,235,.12);border:2px dashed #93b4f8;border-radius:5px;}
  .card-desc{font-size:11px;color:#666;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word;cursor:pointer;}
  .card-desc.expanded{-webkit-line-clamp:unset;}

  /* CARD EDIT */
  .card-edit-wrap{display:none;flex-direction:column;gap:4px;}
  .card-edit-wrap.open{display:flex;}
  .card-edit-input{font-family:'DM Sans',sans-serif;font-size:11px;border:1px solid #bbb;border-radius:3px;padding:3px 5px;outline:none;width:100%;}
  .card-edit-input.title-input{font-weight:700;text-align:center;}
  .card-edit-input:focus{border-color:#555;}
  .card-edit-btns{display:flex;gap:3px;justify-content:flex-end;}
  .card-edit-btn{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;border:none;cursor:pointer;}
  .card-edit-btn.save{background:#111;color:#fff;}
  .card-edit-btn.save:hover{background:#333;}
  .card-edit-btn.cancel{background:#f1f0ee;color:#555;}

  /* CARD META */
  .card-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:2px;}
  .card-badge{font-family:'DM Mono',monospace;font-size:10px;padding:1px 5px;border-radius:3px;background:#f1f0ee;color:#555;cursor:pointer;border:1px solid #e0ddd8;transition:background .1s;white-space:nowrap;}
  .card-badge:hover{background:#e5e3de;}
  .card-badge.priority-critical{background:#fee2e2;color:var(--critical);border-color:#fca5a5;font-weight:700;}
  .card-badge.priority-high    {background:#fee2e2;color:var(--high);  border-color:#fca5a5;}
  .card-badge.priority-normal  {background:#ede9fe;color:var(--normal);border-color:#c4b5fd;}
  .card-badge.priority-low     {background:#f1f5f9;color:var(--low);   border-color:#cbd5e1;}

  /* EFFORT PIPS */
  .effort-icon{display:inline-flex;align-items:flex-end;gap:2px;}
  .effort-pip{width:4px;border-radius:1px;background:currentColor;opacity:.2;}
  .effort-pip.active{opacity:1;}

  /* CARD ACTIONS */
  .card-actions{position:absolute;top:4px;right:4px;display:none;gap:2px;z-index:10;}
  .card:hover .card-actions{display:flex;}
  .card-btn{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;border:none;cursor:pointer;background:#f1f0ee;color:#444;transition:background .1s;}
  .card-btn:hover{background:#e0ddd8;}
  .card-btn.to-trash{background:#fee2e2;color:var(--high);}
  .card-btn.to-trash:hover{background:#fca5a5;}
  .card-btn.restore{background:#dcfce7;color:#15803d;}
  .card-btn.restore:hover{background:#bbf7d0;}
  .card-btn.forget{background:#fee2e2;color:var(--high);}
  .card-btn.forget:hover{background:#fca5a5;}
  .card-btn.edit-btn{background:#ede9fe;color:var(--normal);}
  .card-btn.edit-btn:hover{background:#c4b5fd;}

  /* DIFF TOOLTIP */
  .diff-tooltip{
    position:fixed;z-index:500;
    background:#17161a;border:1px solid #333;border-radius:7px;
    padding:8px 10px;min-width:180px;max-width:280px;
    box-shadow:0 6px 20px rgba(0,0,0,.4);
    display:none;flex-direction:column;gap:5px;
    pointer-events:none;
  }
  .diff-tooltip.visible{display:flex;}
  .diff-row{display:flex;flex-direction:column;gap:1px;}
  .diff-field{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#555;}
  .diff-old{font-size:11px;color:#f87171;text-decoration:line-through;word-break:break-word;}
  .diff-new{font-size:11px;color:#4ade80;word-break:break-word;}

  /* UNSAVED BAR */
  .unsaved-bar{background:#17161a;border-top:2px solid var(--wip-h);padding:4px 14px;display:none;align-items:center;justify-content:space-between;gap:10px;font-size:11px;color:#888;font-family:'DM Mono',monospace;flex-shrink:0;}
  .unsaved-bar.visible{display:flex;}
  .unsaved-bar-btns{display:flex;gap:6px;}

  /* POPOVER */
  .popover{position:fixed;background:#17161a;border:1px solid #2e2e2c;border-radius:7px;padding:5px;box-shadow:0 6px 20px rgba(0,0,0,.4);z-index:300;display:none;flex-direction:column;gap:2px;min-width:130px;}
  .popover.open{display:flex;}
  .popover-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:#555;font-family:'DM Mono',monospace;padding:2px 6px 4px;}
  .popover-option{padding:4px 7px;border-radius:4px;cursor:pointer;font-size:12px;color:#ccc;transition:background .1s;}
  .popover-option:hover{background:#2a2a28;}
  .popover-option.selected{color:#fff;font-weight:600;}

  /* DIALOG */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:center;justify-content:center;}
  .overlay.open{display:flex;}
  .dialog{background:#17161a;border:1px solid #2e2e2c;border-radius:10px;padding:20px;max-width:320px;width:90%;display:flex;flex-direction:column;gap:12px;}
  .dialog-title{font-size:14px;font-weight:600;color:#fff;}
  .dialog-body{font-size:12px;color:#888;line-height:1.5;}
  .dialog-actions{display:flex;gap:7px;justify-content:flex-end;}
  .btn-dlg-cancel {font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 12px;border-radius:5px;border:1px solid #333;background:transparent;color:#aaa;cursor:pointer;}
  .btn-dlg-cancel:hover{border-color:#666;color:#fff;}
  .btn-dlg-confirm{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:5px 12px;border-radius:5px;border:none;background:#dc2626;color:#fff;cursor:pointer;}
  .btn-dlg-confirm:hover{background:#b91c1c;}

  /* ARCHIVE MODAL */
  .archive-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center;}
  .archive-modal.open{display:flex;}
  .archive-inner{background:#f5f4f0;border-radius:12px;width:90%;max-width:760px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
  .archive-header{background:#171614;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .archive-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:#fff;}
  .archive-close{background:transparent;border:1px solid #333;color:#aaa;font-size:11px;padding:3px 9px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .archive-close:hover{color:#fff;border-color:#666;}
  .archive-body{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
  .archive-month{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:#888;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid #dddbd5;padding-bottom:3px;margin-bottom:4px;}
  .archive-item{font-size:12px;color:#555;padding:3px 0;border-bottom:1px solid #eeecea;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;}
  .archive-item-index{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;flex-shrink:0;}
  .archive-item-from{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:3px;flex-shrink:0;}
  .archive-item-from.done{background:#dcfce7;color:#15803d;}
  .archive-item-from.open{background:#dbeafe;color:#1d4ed8;}
  .archive-item-from.wip {background:#ffedd5;color:#c2410c;}
  .archive-item-title{font-weight:600;color:#333;}
  .archive-item-desc{color:#888;}
  .archive-effort{font-family:'DM Mono',monospace;font-size:10px;background:#f1f0ee;padding:1px 5px;border-radius:3px;color:#888;flex-shrink:0;}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="app-title">TODO</span>
    <span class="project-name" id="projectName">—</span>
  </div>
  <div class="header-center">
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="Search…" oninput="onSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div class="header-right">
    <div class="status"><div class="status-dot" id="statusDot"></div><span id="statusText">connecting…</span></div>
    <button class="hbtn hbtn-dark"  onclick="openArchive()">Archive</button>
    <button class="hbtn hbtn-ghost" onclick="confirmRefresh()">Refresh</button>
    <button class="hbtn hbtn-light" id="btnSave" disabled onclick="commitSave()">Save</button>
  </div>
</header>

<div class="offline-banner" id="offlineBanner">Server unavailable — start start-server.bat and reload.</div>
<div class="board-wrap"><div class="board" id="board"></div></div>

<div class="unsaved-bar" id="unsavedBar">
  <span id="unsavedMsg">Unsaved changes</span>
  <div class="unsaved-bar-btns">
    <button class="hbtn hbtn-ghost" style="font-size:11px;padding:3px 8px" onclick="confirmRefresh()">Discard</button>
    <button class="hbtn hbtn-light" style="font-size:11px;padding:3px 8px" onclick="commitSave()">Save now</button>
  </div>
</div>

<!-- DIFF TOOLTIP -->
<div class="diff-tooltip" id="diffTooltip"></div>

<div class="popover" id="popover"></div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <div class="dialog-title" id="dialogTitle"></div>
    <div class="dialog-body"  id="dialogBody"></div>
    <div class="dialog-actions" id="dialogActions"></div>
  </div>
</div>

<div class="archive-modal" id="archiveModal">
  <div class="archive-inner">
    <div class="archive-header">
      <span class="archive-title">Archive — TODO-archive.md</span>
      <button class="archive-close" onclick="closeArchive()">Close</button>
    </div>
    <div class="archive-body" id="archiveBody">Loading…</div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const params       = new URLSearchParams(window.location.search);
const TODO_PATH    = params.get('todo') || '';
const ARCHIVE_PATH = TODO_PATH.replace(/TODO\.md$/i, 'TODO-archive.md');
const WORK_PATH    = TODO_PATH.replace(/TODO\.md$/i, 'TODO-work.json');
const SERVER       = 'http://localhost:3000';
const LS_SPLIT     = 'todo-tool-split';
const PRIORITIES   = ['critical','high','normal','low'];
const STATES       = ['open','wip','done'];
const IDX_PFX      = {open:'O',wip:'W',done:'D'};

// ── STATE ─────────────────────────────────────────────────────────────────────
let items      = [];
let trashed    = [];
let snapshot   = {};
let dirty      = false;
let connected  = false;
let dirtyIds   = new Set();
let splitPct   = parseFloat(localStorage.getItem(LS_SPLIT)||'65');
let searchQuery = '';

// ── SEARCH ────────────────────────────────────────────────────────────────────
function onSearch(val){
  searchQuery=val.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('visible', searchQuery.length>0);
  render();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  onSearch('');
  document.getElementById('searchInput').focus();
}
function matchesSearch(item){
  if(!searchQuery) return true;
  const idx=`${IDX_PFX[item.state]||'?'}${item.seq||''}`.toLowerCase();
  return (item.title||'').toLowerCase().includes(searchQuery)
      || (item.desc||'').toLowerCase().includes(searchQuery)
      || (item.priority||'').toLowerCase().includes(searchQuery)
      || (item.effort||'').toLowerCase().includes(searchQuery)
      || idx.includes(searchQuery);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  buildBoard();
  if (!TODO_PATH) { document.getElementById('projectName').textContent='no ?todo= param'; setStatus('error'); return; }
  const parts=TODO_PATH.replace(/\\/g,'/').split('/');
  const idx=parts.findIndex(p=>p.toLowerCase()==='todo.md');
  document.getElementById('projectName').textContent=idx>0?parts[idx-1]:parts[parts.length-2];
  await checkServer();
  if (connected) await loadData();
}

// ── BUILD BOARD ───────────────────────────────────────────────────────────────
function buildBoard() {
  const cols=[
    {state:'open',label:'Open',       cls:'col-open'},
    {state:'wip', label:'In Progress',cls:'col-wip'},
    {state:'done',label:'Done',       cls:'col-done'},
  ];
  document.getElementById('board').innerHTML=cols.map((c,i)=>`
    ${i>0?'<div class="col-sep"></div>':''}
    <div class="column ${c.cls}" id="column-${c.state}">
      <div class="col-header">
        <span class="col-title">${c.label}</span>
        <span class="col-count" id="cnt-${c.state}">0</span>
      </div>
      <div class="col-active" id="active-${c.state}" style="flex:${splitPct} 1 0"></div>
      <div class="col-splitter" id="splitter-${c.state}" data-state="${c.state}"></div>
      <div class="col-trash" id="trash-${c.state}" style="flex:${100-splitPct} 1 0;min-height:38px">
        <div class="trash-header">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 3h7l-.8 5.5H2.3L1.5 3z" stroke="#999" stroke-width="1.2"/><path d="M3.5 1.5h3M1 3h8" stroke="#999" stroke-width="1.2" stroke-linecap="round"/></svg>
          Trash
        </div>
        <div class="trash-cards" id="trash-cards-${c.state}"
          ondragover="onDragOverTrash(event,'${c.state}')"
          ondragleave="onDragLeave(event)"
          ondrop="onDropTrash(event,'${c.state}')">
        </div>
      </div>
      <div class="col-footer">
        <button class="add-card-btn" id="add-${c.state}-btn" onclick="showAddForm('${c.state}')">+ Add item</button>
        <div class="add-form-inline" id="add-${c.state}-form">
          <input type="text" id="add-${c.state}-title" placeholder="Title (optional)…">
          <input type="text" id="add-${c.state}-desc"  placeholder="Description…"
            onkeydown="if(event.key==='Enter') confirmAdd('${c.state}'); if(event.key==='Escape') hideAddForm('${c.state}')">
          <div class="add-form-row">
            <select id="add-${c.state}-priority"><option value="critical">Critical</option><option value="high">High</option><option value="normal" selected>Normal</option><option value="low">Low</option></select>
            <select id="add-${c.state}-effort"><option value="">— effort</option><option value="XS">XS</option><option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option></select>
          </div>
          <div class="add-form-btns">
            <button class="btn-add-cancel"  onclick="hideAddForm('${c.state}')">Cancel</button>
            <button class="btn-add-confirm" onclick="confirmAdd('${c.state}')">Add</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
  STATES.forEach(s=>{
    document.getElementById(`splitter-${s}`).addEventListener('mousedown',e=>startSplitterDrag(e,s));
  });
}

// ── SPLITTER ──────────────────────────────────────────────────────────────────
function startSplitterDrag(e,state){
  e.preventDefault();
  const col=document.getElementById(`column-${state}`);
  const onMove=ev=>{
    const rect=col.getBoundingClientRect();
    const pct=Math.min(85,Math.max(15,(ev.clientY-rect.top)/rect.height*100));
    splitPct=pct; localStorage.setItem(LS_SPLIT,pct); applySplit();
  };
  const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}
function applySplit(){
  STATES.forEach(s=>{
    const a=document.getElementById(`active-${s}`);
    const t=document.getElementById(`trash-${s}`);
    if(a)a.style.flex=`${splitPct} 1 0`;
    if(t)t.style.flex=`${100-splitPct} 1 0`;
  });
}

// ── SERVER ────────────────────────────────────────────────────────────────────
async function checkServer(){
  try{const d=await fetch(`${SERVER}/ping`).then(r=>r.json());if(d.ok){connected=true;setStatus('connected');}else setStatus('disconnected');}
  catch{setStatus('disconnected');}
}
function setStatus(s){
  document.getElementById('statusDot').className='status-dot '+s;
  document.getElementById('statusText').textContent={connected:'connected',disconnected:'offline',error:'error'}[s]||s;
  document.getElementById('offlineBanner').classList.toggle('visible',s==='disconnected');
  connected=s==='connected';
}
async function readFile(path){
  const r=await fetch(`${SERVER}/file?path=${encodeURIComponent(path)}`);
  if(r.status===404)return null; if(!r.ok)throw new Error(`read ${r.status}`); return r.text();
}
async function writeFile(path,content){
  const r=await fetch(`${SERVER}/file?path=${encodeURIComponent(path)}`,{method:'POST',headers:{'Content-Type':'text/plain; charset=utf-8'},body:content});
  if(!r.ok){setStatus('error');throw new Error(`write ${r.status}`);}
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadData(){
  const workRaw=await readFile(WORK_PATH);
  if(workRaw){
    try{
      const d=JSON.parse(workRaw);
      items=d.items||d; trashed=d.trashed||[];
      snapshot=d.snapshot||{}; dirtyIds=new Set(d.dirtyIds||[]); dirty=true;
      applyExistingIndexes(); render(); return;
    }catch{}
  }
  const mdRaw=await readFile(TODO_PATH);
  items=mdRaw?parseTodo(mdRaw):[];
  trashed=[]; dirtyIds=new Set(); dirty=false;
  applyExistingIndexes(); takeSnapshot(); render();
}

function takeSnapshot(){
  snapshot={};
  items.forEach(i=>{snapshot[i.id]={title:i.title,desc:i.desc,priority:i.priority,state:i.state,effort:i.effort};});
}

// ── PARSE ─────────────────────────────────────────────────────────────────────
function parseTodo(md){
  const lines=md.split('\n'); let priority='normal';
  const result=[]; let autoId=1;
  for(const line of lines){
    const t=line.trim().toLowerCase();
    if(t.startsWith('## critical')){priority='critical';continue;}
    if(t.startsWith('## high'))    {priority='high';    continue;}
    if(t.startsWith('## normal'))  {priority='normal';  continue;}
    if(t.startsWith('## low'))     {priority='low';     continue;}
    if(t.startsWith('## done'))    {priority='normal';  continue;}
    if(t.startsWith('## wip'))     {                    continue;}
    const openMatch=line.match(/^- \[ \] (.+)/);
    const doneMatch=line.match(/^- \[x\] (.+)/i);
    if(openMatch||doneMatch){
      const raw=(openMatch||doneMatch)[1].trim();
      const isWip=raw.startsWith('[WIP]');
      const isDone=!!doneMatch;
      let rest=raw.replace(/^\[WIP\]\s*/,'');
      const idxMatch=rest.match(/^\[([OWD])(\d+)\]\s*/i);
      let existingSeq=null,existingState=null;
      if(idxMatch){
        existingSeq=parseInt(idxMatch[2],10);
        existingState={O:'open',W:'wip',D:'done'}[idxMatch[1].toUpperCase()]||null;
        rest=rest.slice(idxMatch[0].length);
      }
      const em=rest.match(/\[effort:\s*(XS|S|M|L|XL)\]/i);
      const effort=em?em[1].toUpperCase():'';
      rest=rest.replace(/\[effort:\s*(XS|S|M|L|XL)\]\s*/i,'').trim();
      rest=rest.replace(/\[archived-from:\s*\w+\]\s*/i,'').trim();
      const pipeIdx=rest.indexOf(' | ');
      let title='',desc='';
      if(pipeIdx>=0){title=rest.slice(0,pipeIdx).trim();desc=rest.slice(pipeIdx+3).trim();}
      else{desc=rest;}
      let state=isDone?'done':isWip?'wip':'open';
      result.push({id:autoId++,title,desc,priority,state,effort,existingSeq,existingState});
    }
  }
  return result;
}

// ── APPLY EXISTING INDEXES (load only) ───────────────────────────────────────
// Preserves indexes exactly as written in the file. Items without an index
// get a seq after the highest existing one in their column. No renumbering.
function applyExistingIndexes(){
  STATES.forEach(state=>{
    const si=items.filter(i=>i.state===state);
    let maxSeq=0;
    si.forEach(item=>{
      if(item.existingState===state&&item.existingSeq!=null){
        item.seq=item.existingSeq;
        if(item.existingSeq>maxSeq)maxSeq=item.existingSeq;
      }
    });
    si.forEach(item=>{
      if(item.seq==null){item.seq=++maxSeq;}
    });
  });
  items.forEach(i=>{delete i.existingSeq;delete i.existingState;});
}

// ── REINDEX (drag-and-drop only) ─────────────────────────────────────────────
// Renumbers sequentially from 1. Call only after D&D reorder, never on load.
function reindex(){
  STATES.forEach(state=>{
    items.filter(i=>i.state===state).sort((a,b)=>a.seq-b.seq).forEach((item,n)=>{item.seq=n+1;});
  });
}

// ── SERIALIZE ─────────────────────────────────────────────────────────────────
function serializeTodo(existingMd,items){
  const lines=existingMd.split('\n');
  const headerLines=[]; let inContent=false;
  for(const l of lines){
    const t=l.trim().toLowerCase();
    if(!inContent&&(t.startsWith('## critical')||t.startsWith('## high')||t.startsWith('## normal')||t.startsWith('## low')||t.startsWith('## done')||t.startsWith('## wip')))inContent=true;
    if(!inContent)headerLines.push(l);
  }
  const footerStart=lines.findIndex(l=>l.trim().startsWith('## Index'));
  const footerLines=footerStart>=0?lines.slice(footerStart):['## Index','','| Term | Occurrences |','|------|-------------|'];

  const renderItem=i=>{
    const e=i.effort?` [effort: ${i.effort}]`:'';
    const w=i.state==='wip'?'[WIP] ':'';
    const b=i.state==='done'?'[x]':'[ ]';
    const idx=`[${IDX_PFX[i.state]}${i.seq}] `;
    const text=i.title?`${i.title} | ${i.desc}`:i.desc;
    return`- ${b} ${w}${idx}${text}${e}`;
  };
  const section=(title,arr)=>arr.length?`## ${title}\n\n${arr.map(renderItem).join('\n')}\n`:'';
  const sortedBy=(state)=>items.filter(i=>i.state===state).sort((a,b)=>{
    const pd=PRIORITIES.indexOf(a.priority)-PRIORITIES.indexOf(b.priority);
    return pd!==0?pd:a.seq-b.seq;
  });
  const openItems=sortedBy('open');
  const body=[
    section('Critical',    openItems.filter(i=>i.priority==='critical')),
    section('High priority',openItems.filter(i=>i.priority==='high')),
    section('Normal',       openItems.filter(i=>i.priority==='normal')),
    section('Low priority', openItems.filter(i=>i.priority==='low')),
  ].filter(Boolean).join('\n');
  const wipSection =section('WIP', sortedBy('wip'));
  const doneSection=section('Done',sortedBy('done'));
  return[...headerLines,body,wipSection,doneSection,...footerLines].join('\n');
}

// ── ARCHIVE TRASHED ───────────────────────────────────────────────────────────
async function archiveTrashedItems(){
  if(!trashed.length)return;
  const now=new Date();
  const month=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  let arch=await readFile(ARCHIVE_PATH)||'# TODO Archive\n';
  arch+=`\n## ${month}\n\n${trashed.map(i=>{
    const e=i.effort?` [effort: ${i.effort}]`:'';
    const text=i.title?`${i.title} | ${i.desc}`:i.desc;
    const from=`[archived-from: ${i.origState}]`;
    const idx=`[${IDX_PFX[i.origState]||'O'}${i.seq||'?'}] `;
    return`- [x] ${idx}${text}${e} ${from}`;
  }).join('\n')}\n`;
  await writeFile(ARCHIVE_PATH,arch);
  trashed=[];
}

// ── SAVE ──────────────────────────────────────────────────────────────────────
async function saveWork(){
  if(!connected)return;
  await writeFile(WORK_PATH,JSON.stringify({items,trashed,snapshot,dirtyIds:[...dirtyIds]},null,2));
  dirty=true; updateBar();
}

async function commitSave(){
  if(!connected)return;
  await archiveTrashedItems();
  const md=await readFile(TODO_PATH)||'';
  await writeFile(TODO_PATH,serializeTodo(md,items));
  await fetch(`${SERVER}/file?path=${encodeURIComponent(WORK_PATH)}`,{method:'DELETE'});
  dirtyIds=new Set(); trashed=[]; dirty=false;
  takeSnapshot(); updateBar(); render();
}

function updateBar(){
  document.getElementById('unsavedBar').classList.toggle('visible',dirty);
  document.getElementById('btnSave').disabled=!dirty||!connected;
  let msg='Unsaved changes';
  const t=trashed.length; if(t>0)msg+=` · ${t} in trash`;
  document.getElementById('unsavedMsg').textContent=msg;
}

// ── REFRESH ───────────────────────────────────────────────────────────────────
function confirmRefresh(){
  showDialog('Reload TODO.md?',
    dirty?'All unsaved changes and trashed items will be lost.':'Reload from disk.',
    [{label:'Cancel',cls:'btn-dlg-cancel',action:closeDialog},
     {label:'Reload',cls:'btn-dlg-confirm',action:async()=>{closeDialog();await doRefresh();}}]);
}
async function doRefresh(){
  await fetch(`${SERVER}/file?path=${encodeURIComponent(WORK_PATH)}`,{method:'DELETE'}).catch(()=>{});
  const mdRaw=await readFile(TODO_PATH);
  items=mdRaw?parseTodo(mdRaw):[]; trashed=[]; dirtyIds=new Set(); dirty=false;
  applyExistingIndexes(); takeSnapshot(); render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  updateBar();
  STATES.forEach(state=>{
    const activeEl=document.getElementById(`active-${state}`);
    const trashEl =document.getElementById(`trash-cards-${state}`);
    const cnt     =document.getElementById(`cnt-${state}`);
    const si=items.filter(i=>i.state===state).sort((a,b)=>{
      const pd=PRIORITIES.indexOf(a.priority)-PRIORITIES.indexOf(b.priority);
      return pd!==0?pd:a.seq-b.seq;
    });
    cnt.textContent=si.length;
    activeEl.innerHTML=PRIORITIES.map(priority=>{
      const lane=si.filter(i=>i.priority===priority&&matchesSearch(i));
      if(!lane.length)return'';
      return`<div class="priority-lane">
        <div class="priority-lane-header ${priority}"><span class="lane-dot ${priority}"></span>${priority}</div>
        <div class="lane-cards" id="lane-${state}-${priority}"
          ondragover="onDragOver(event,'${state}','${priority}')"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event,'${state}','${priority}')">
          ${lane.map(item=>renderCard(item,false)).join('')}
        </div>
      </div>`;
    }).join('');
    const stateTrash=trashed.filter(i=>i.origState===state&&matchesSearch(i));
    trashEl.innerHTML=stateTrash.map(item=>renderCard(item,true)).join('');
  });
}

// ── CARD ──────────────────────────────────────────────────────────────────────
function renderCard(item,isTrashed){
  const isDirty=!isTrashed&&dirtyIds.has(item.id);
  const idxLabel=`${IDX_PFX[isTrashed?item.origState:item.state]||'?'}${item.seq||'?'}`;
  const priorityCls=item.priority||'low';

  const titleHtml=item.title
    ?`<div class="card-title">${escHtml(item.title)}</div>`
    :`<div class="card-title no-title">— no title —</div>`;

  const descHtml=item.desc
    ?`<div class="card-desc" id="card-desc-${item.id}" onclick="toggleExpand(${item.id})">${escHtml(item.desc)}</div>`:'';

  const priorityBadge=`<span class="card-badge priority-${item.priority}"${isTrashed?'':` onclick="openPopover(event,'priority',${item.id})"`}>${item.priority}</span>`;
  const effortBadge  =`<span class="card-badge"${isTrashed?'':` onclick="openPopover(event,'effort',${item.id})"`}>${effortIcon(item.effort)}</span>`;

  let actions='';
  if(isTrashed){
    actions=`<button class="card-btn restore" onclick="restoreItem(${item.id})">Restore</button>
             <button class="card-btn forget"  onclick="forgetItem(${item.id})">Forget</button>`;
  } else {
    const stateBtn=item.state==='open'
      ?`<button class="card-btn" onclick="setState(${item.id},'wip')">WIP</button><button class="card-btn" onclick="setState(${item.id},'done')">Done</button>`
      :item.state==='wip'
      ?`<button class="card-btn" onclick="setState(${item.id},'open')">Open</button><button class="card-btn" onclick="setState(${item.id},'done')">Done</button>`
      :`<button class="card-btn" onclick="setState(${item.id},'open')">Reopen</button>`;
    actions=`${stateBtn}
             <button class="card-btn edit-btn" onclick="startEdit(${item.id})">Edit</button>
             <button class="card-btn to-trash" onclick="trashItem(${item.id})">&#x2715;</button>`;
  }

  const editWrap=isTrashed?'':`
    <div class="card-edit-wrap" id="edit-wrap-${item.id}">
      <input class="card-edit-input title-input" id="edit-title-${item.id}" type="text" placeholder="Title…" value="${escHtml(item.title||'')}">
      <input class="card-edit-input"              id="edit-desc-${item.id}"  type="text" placeholder="Description…" value="${escHtml(item.desc||'')}"
        onkeydown="if(event.key==='Enter') commitEdit(${item.id}); if(event.key==='Escape') cancelEdit(${item.id})">
      <div class="card-edit-btns">
        <button class="card-edit-btn cancel" onclick="cancelEdit(${item.id})">Cancel</button>
        <button class="card-edit-btn save"   onclick="commitEdit(${item.id})">Save</button>
      </div>
    </div>`;

  const diffAttr=isDirty?`onmouseenter="showDiff(event,${item.id})" onmouseleave="hideDiff()"`:'';

  return`<div class="card card-${priorityCls}${isDirty?' dirty-card':''}${isTrashed?' trashed':''}"
    data-id="${item.id}" draggable="${!isTrashed}"
    ondragstart="${isTrashed?'':'onDragStart(event,'+item.id+')'}"
    ondragend="${isTrashed?'':'onDragEnd(event)'}"
    ondragover="${isTrashed?'':'onDragOverCard(event,'+item.id+')'}"
    ondrop="${isTrashed?'':'onDropCard(event,'+item.id+')'}"
    ${diffAttr}>
    <div class="card-actions">${actions}</div>
    <div class="card-header-row">
      <span class="card-index">${idxLabel}</span>
      ${titleHtml}
    </div>
    ${editWrap}
    ${descHtml}
    <div class="card-meta">${priorityBadge}${effortBadge}</div>
  </div>`;
}

// ── EFFORT ICON ───────────────────────────────────────────────────────────────
const EFFORT_PIPS={XS:1,S:2,M:3,L:4,XL:5};
const EFFORT_COLORS={XS:'#0ea5e9',S:'#22c55e',M:'#eab308',L:'#f97316',XL:'#ef4444'};
function effortIcon(effort){
  if(!effort)return'<span style="color:#ccc;font-size:10px">+</span>';
  const n=EFFORT_PIPS[effort]||0,col=EFFORT_COLORS[effort]||'#888';
  return`<span class="effort-icon" style="color:${col}" title="${effort}">${[1,2,3,4,5].map(i=>`<span class="effort-pip ${i<=n?'active':''}" style="height:${5+i*2}px"></span>`).join('')}</span>`;
}

// ── DIFF TOOLTIP ──────────────────────────────────────────────────────────────
function showDiff(e,id){
  const item=items.find(i=>i.id===id); if(!item)return;
  const snap=snapshot[id]; if(!snap)return;
  const fields=[
    {key:'title',   label:'Title'},
    {key:'desc',    label:'Description'},
    {key:'priority',label:'Priority'},
    {key:'state',   label:'State'},
    {key:'effort',  label:'Effort'},
  ];
  const rows=fields.filter(f=>(snap[f.key]||'')!==(item[f.key]||'')).map(f=>`
    <div class="diff-row">
      <span class="diff-field">${f.label}</span>
      <span class="diff-old">${escHtml(snap[f.key]||'—')}</span>
      <span class="diff-new">${escHtml(item[f.key]||'—')}</span>
    </div>`).join('');
  if(!rows)return;
  const tip=document.getElementById('diffTooltip');
  tip.innerHTML=rows;
  tip.style.left=`${e.clientX+12}px`;
  tip.style.top =`${e.clientY-10}px`;
  tip.classList.add('visible');
}
function hideDiff(){document.getElementById('diffTooltip').classList.remove('visible');}

// ── EXPAND ────────────────────────────────────────────────────────────────────
function toggleExpand(id){const el=document.getElementById(`card-desc-${id}`);if(el)el.classList.toggle('expanded');}

// ── EDIT ──────────────────────────────────────────────────────────────────────
function startEdit(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  const wrap=document.getElementById(`edit-wrap-${id}`);if(!wrap)return;
  wrap.previousElementSibling&&(wrap.previousElementSibling.style.display='none');
  const titleEl=wrap.parentElement.querySelector('.card-title');
  if(titleEl)titleEl.style.display='none';
  const descEl=document.getElementById(`card-desc-${id}`);
  if(descEl)descEl.style.display='none';
  document.getElementById(`edit-title-${id}`).value=item.title||'';
  document.getElementById(`edit-desc-${id}`).value=item.desc||'';
  wrap.classList.add('open');
  document.getElementById(`edit-title-${id}`).focus();
}
function commitEdit(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  item.title=document.getElementById(`edit-title-${id}`).value.trim();
  item.desc =document.getElementById(`edit-desc-${id}`).value.trim();
  markDirty(id); saveWork(); render();
}
function cancelEdit(id){render();}

// ── STATE ─────────────────────────────────────────────────────────────────────
function setState(id,state){
  const item=items.find(i=>i.id===id);
  if(item){item.state=state;markDirty(id);saveWork();render();}
}

// ── ADD ───────────────────────────────────────────────────────────────────────
function showAddForm(state){
  document.getElementById(`add-${state}-btn`).style.display='none';
  document.getElementById(`add-${state}-form`).classList.add('open');
  document.getElementById(`add-${state}-title`).focus();
}
function hideAddForm(state){
  document.getElementById(`add-${state}-btn`).style.display='';
  document.getElementById(`add-${state}-form`).classList.remove('open');
  document.getElementById(`add-${state}-title`).value='';
  document.getElementById(`add-${state}-desc`).value='';
}
function confirmAdd(state){
  const title=document.getElementById(`add-${state}-title`).value.trim();
  const desc =document.getElementById(`add-${state}-desc`).value.trim();
  if(!title&&!desc)return;
  const priority=document.getElementById(`add-${state}-priority`).value;
  const effort  =document.getElementById(`add-${state}-effort`).value;
  const id=Date.now();
  const maxSeq=Math.max(0,...items.filter(i=>i.state===state).map(i=>i.seq||0));
  items.push({id,title,desc,priority,state,effort,seq:maxSeq+1});
  markDirty(id); hideAddForm(state); saveWork(); render();
}

// ── TRASH / RESTORE / FORGET ──────────────────────────────────────────────────
function trashItem(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  trashed.push({...item,origState:item.state});
  items=items.filter(i=>i.id!==id);
  dirtyIds.add(id); saveWork(); render();
}
function restoreItem(id){
  const item=trashed.find(i=>i.id===id);if(!item)return;
  trashed=trashed.filter(i=>i.id!==id);
  const maxSeq=Math.max(0,...items.filter(i=>i.state===item.origState).map(i=>i.seq||0));
  items.push({...item,state:item.origState,seq:maxSeq+1});
  markDirty(id); saveWork(); render();
}
function forgetItem(id){
  const item=trashed.find(i=>i.id===id);if(!item)return;
  showDialog('Forget permanently?',
    `"${item.title||item.desc}" will be deleted forever — no archive.`,
    [{label:'Cancel',cls:'btn-dlg-cancel',action:closeDialog},
     {label:'Forget',cls:'btn-dlg-confirm',action:()=>{
       trashed=trashed.filter(i=>i.id!==id); dirtyIds.delete(id);
       saveWork(); render(); closeDialog();
     }}]);
}

// ── DRAG ──────────────────────────────────────────────────────────────────────
let dragId=null;
let dropTargetId=null;
let dropBefore=true;

function onDragStart(e,id){
  dragId=id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(id));
}

function onDragEnd(e){
  e.target.classList.remove('dragging');
  clearPlaceholders();
  document.querySelectorAll('.lane-cards,.trash-cards').forEach(c=>c.classList.remove('drag-over'));
  dragId=null; dropTargetId=null;
}

function clearPlaceholders(){
  document.querySelectorAll('.drop-ph').forEach(el=>el.remove());
}

function onDragLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drag-over');
}

function onDragOverCard(e,targetId){
  e.preventDefault();e.stopPropagation();
  if(dragId===targetId)return;
  const card=e.currentTarget;
  const rect=card.getBoundingClientRect();
  const before=(e.clientY-rect.top)<rect.height/2;
  if(dropTargetId===targetId&&dropBefore===before)return;
  dropTargetId=targetId; dropBefore=before;
  clearPlaceholders();
  const ph=document.createElement('div');
  ph.className='drop-ph active';
  if(before) card.parentNode.insertBefore(ph,card);
  else       card.parentNode.insertBefore(ph,card.nextSibling);
}

function onDropCard(e,targetId){
  e.preventDefault();e.stopPropagation();
  clearPlaceholders();
  document.querySelectorAll('.lane-cards,.trash-cards').forEach(c=>c.classList.remove('drag-over'));
  const id=parseInt(e.dataTransfer.getData('text/plain'),10);
  if(!id||id===targetId)return;
  const dragItem=items.find(i=>i.id===id);
  const targetItem=items.find(i=>i.id===targetId);
  if(!dragItem||!targetItem)return;
  const newState=targetItem.state;
  const newPriority=targetItem.priority;
  dragItem.state=newState; dragItem.priority=newPriority;
  const laneItems=items.filter(i=>i.state===newState&&i.priority===newPriority&&i.id!==id)
    .sort((a,b)=>a.seq-b.seq);
  const tIdx=laneItems.findIndex(i=>i.id===targetId);
  const insertAt=dropBefore?tIdx:tIdx+1;
  laneItems.splice(insertAt,0,dragItem);
  laneItems.forEach((item,n)=>{item.seq=n+1;});
  STATES.forEach(st=>PRIORITIES.forEach(pr=>{
    if(st===newState&&pr===newPriority)return;
    items.filter(i=>i.state===st&&i.priority===pr).sort((a,b)=>a.seq-b.seq).forEach((item,n)=>{item.seq=n+1;});
  }));
  markDirty(id); saveWork(); render();
}

function onDragOver(e,state,priority){
  e.preventDefault();e.stopPropagation();
  if(!document.querySelector(`#lane-${state}-${priority} .drop-ph`)){
    clearPlaceholders();
    const lane=document.getElementById(`lane-${state}-${priority}`);
    if(lane){const ph=document.createElement('div');ph.className='drop-ph active';lane.appendChild(ph);}
  }
}
function onDrop(e,state,priority){
  e.preventDefault();e.stopPropagation();
  clearPlaceholders();
  document.querySelectorAll('.lane-cards,.trash-cards').forEach(c=>c.classList.remove('drag-over'));
  const id=parseInt(e.dataTransfer.getData('text/plain'),10);
  const item=items.find(i=>i.id===id);
  if(item){
    item.state=state;item.priority=priority;
    const laneItems=items.filter(i=>i.state===state&&i.priority===priority&&i.id!==id).sort((a,b)=>a.seq-b.seq);
    laneItems.push(item);
    laneItems.forEach((it,n)=>{it.seq=n+1;});
    markDirty(id); saveWork(); render();
  }
}
function onDragOverTrash(e,state){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.lane-cards,.trash-cards').forEach(c=>c.classList.remove('drag-over'));
  document.getElementById(`trash-cards-${state}`)?.classList.add('drag-over');
}
function onDropTrash(e,state){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.lane-cards,.trash-cards').forEach(c=>c.classList.remove('drag-over'));
  clearPlaceholders();
  const id=parseInt(e.dataTransfer.getData('text/plain'),10);
  if(id)trashItem(id);
}

// ── DIRTY ─────────────────────────────────────────────────────────────────────
function markDirty(id){dirtyIds.add(id);}

// ── POPOVER ───────────────────────────────────────────────────────────────────
let popoverTarget=null,popoverType=null;
function openPopover(e,type,id){
  e.stopPropagation();
  const item=items.find(i=>i.id===id);if(!item)return;
  popoverTarget=id;popoverType=type;
  const pop=document.getElementById('popover');
  const opts=type==='priority'
    ?[{v:'critical',l:'Critical'},{v:'high',l:'High'},{v:'normal',l:'Normal'},{v:'low',l:'Low'}]
    :[{v:'',l:'None'},{v:'XS',l:'XS'},{v:'S',l:'S'},{v:'M',l:'M'},{v:'L',l:'L'},{v:'XL',l:'XL'}];
  const cur=type==='priority'?item.priority:item.effort;
  pop.innerHTML=`<div class="popover-label">${type}</div>`+opts.map(o=>`<div class="popover-option ${o.v===cur?'selected':''}" onclick="selectPopover('${o.v}')">${o.l}</div>`).join('');
  const rect=e.target.getBoundingClientRect();
  pop.style.top=`${rect.bottom+4}px`;pop.style.left=`${rect.left}px`;pop.classList.add('open');
}
function selectPopover(val){
  const item=items.find(i=>i.id===popoverTarget);
  if(item){if(popoverType==='priority')item.priority=val;else item.effort=val;markDirty(item.id);}
  document.getElementById('popover').classList.remove('open');
  saveWork();render();
}
document.addEventListener('click',e=>{if(!document.getElementById('popover').contains(e.target))document.getElementById('popover').classList.remove('open');});

// ── DIALOG ────────────────────────────────────────────────────────────────────
function showDialog(title,body,buttons){
  document.getElementById('dialogTitle').textContent=title;
  document.getElementById('dialogBody').textContent=body;
  const acts=document.getElementById('dialogActions');
  acts.innerHTML='';
  buttons.forEach(b=>{const btn=document.createElement('button');btn.className=b.cls;btn.textContent=b.label;btn.onclick=b.action;acts.appendChild(btn);});
  document.getElementById('overlay').classList.add('open');
}
function closeDialog(){document.getElementById('overlay').classList.remove('open');}

// ── ARCHIVE VIEW ──────────────────────────────────────────────────────────────
async function openArchive(){
  document.getElementById('archiveModal').classList.add('open');
  const body=document.getElementById('archiveBody');
  body.textContent='Loading…';
  const raw=await readFile(ARCHIVE_PATH);
  if(!raw){body.textContent='No archive yet.';return;}
  const lines=raw.split('\n'); let html='';
  for(const line of lines){
    if(line.startsWith('## ')){html+=`<div class="archive-month">${escHtml(line.slice(3))}</div>`;continue;}
    const m=line.match(/^- \[x\] (\[[A-Z]\d+\])?\s*(.+)/i);
    if(m){
      const idx=m[1]||'';
      let rest=m[2];
      const em=rest.match(/\[effort:\s*(XS|S|M|L|XL)\]/i);
      const effort=em?em[1].toUpperCase():'';
      rest=rest.replace(/\[effort:\s*(XS|S|M|L|XL)\]\s*/i,'').trim();
      const fm=rest.match(/\[archived-from:\s*(\w+)\]/i);
      const from=fm?fm[1]:'';
      rest=rest.replace(/\[archived-from:\s*\w+\]\s*/i,'').trim();
      const pipe=rest.indexOf(' | ');
      const title=pipe>=0?rest.slice(0,pipe):rest;
      const desc =pipe>=0?rest.slice(pipe+3):'';
      html+=`<div class="archive-item">
        <span class="archive-item-index">${escHtml(idx)}</span>
        ${from?`<span class="archive-item-from ${from}">${from}</span>`:''}
        <span class="archive-item-title">${escHtml(title)}</span>
        ${desc?`<span class="archive-item-desc">— ${escHtml(desc)}</span>`:''}
        ${effort?`<span class="archive-effort">${effort}</span>`:''}
      </div>`;
    }
  }
  body.innerHTML=html||'<span style="color:#aaa">Empty archive.</span>';
}
function closeArchive(){document.getElementById('archiveModal').classList.remove('open');}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
</body>
